<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picky Songwriter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="songwriter.css">
    <link rel="stylesheet" href="songwriter-overrides.css">
</head>
<body>
    <main class="songwriter-app" id="songwriter-app">
        <div class="left-menu">
            <header class="song-toolbar">
                <div class="toolbar-title">
                    <span class="toolbar-kicker">Record Player</span>
                </div>
                <div class="toolbar-actions">
                    <div class="section-menu" id="section-menu" hidden></div>
                </div>
                <strong id="mode-label" hidden>Display mode</strong>
                <div class="account-bar" id="account-bar" hidden>
                    <span class="account-name" id="account-name">Local browser</span>
                    <button class="account-btn" id="account-open" type="button">Log in</button>
                    <button class="account-btn" id="account-out" type="button" hidden>Log out</button>
                </div>
            </header>

            <section class="player-bar" aria-label="Playback controls">
                <div class="playback-controls">
                    <button class="icon-btn play-btn" id="play-btn" type="button" title="Play" aria-label="Play">&#9654;</button>
                    <button class="icon-btn pause-btn" id="pause-btn" type="button" title="Pause" aria-label="Pause">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="7" y="5" width="3.5" height="14" rx="1"></rect>
                            <rect x="13.5" y="5" width="3.5" height="14" rx="1"></rect>
                        </svg>
                    </button>
                    <button class="icon-btn" id="stop-btn" type="button" title="Stop" aria-label="Stop">&#9632;</button>
                    <button class="icon-btn" id="next-section-btn" type="button" title="Next section" aria-label="Next section">&#9655;&#9655;</button>
                    <button class="icon-btn" id="previous-section-btn" type="button" title="Previous section" aria-label="Previous section">&#9665;&#9665;</button>
                    <span class="beat-lamp beat-orb" id="beat-lamp" aria-hidden="true"></span>
                    <div class="menu-number menu-number-transpose">
                        <span class="menu-number-label">Transpose</span>
                        <label class="tiny-field"><span class="sr-only">Transpose</span><input id="transpose" type="number" min="-12" max="12" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-transpose" type="button" title="Reset transpose" aria-label="Reset transpose">&#8634;</button>
                    </div>
                    <div class="menu-number menu-number-bpm">
                        <span class="menu-number-label">Main BPM</span>
                        <label class="tiny-field"><span class="sr-only">Main BPM</span><input id="play-bpm" type="number" min="30" max="240" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-bpm" type="button" title="Reset main BPM" aria-label="Reset main BPM">&#8634;</button>
                    </div>
                    <div class="display-options">
                        <label class="playable-toggle circular-toggle detailed-duration-toggle display-detail-toggle main-duration-toggle"><input id="show-detailed-durations-display" type="checkbox"><span>Show duration</span></label>
                        <label class="playable-toggle circular-toggle section-title-toggle display-detail-toggle"><input id="show-section-titles-display" type="checkbox"><span>Section titles</span></label>
                        <label class="playable-toggle circular-toggle repetition-toggle display-detail-toggle"><input id="show-repetitions-display" type="checkbox"><span>Show repeats</span></label>
                    </div>
                </div>
                <div class="random-chord-controls" hidden>
                    <label class="tiny-field">Every bars <input id="random-bars" type="number" min="1" max="16" value="4"></label>
                    <button class="panel-btn" id="random-now" type="button">Generate chord</button>
                    <span id="random-output" class="random-output">G</span>
                </div>
            </section>

            <section class="randomizer-panel edit-mode-bar" id="randomizer-panel" hidden>
                <label class="playable-toggle hidden-random-toggle"><input id="random-playback" type="checkbox"> use while playing</label>
                <div class="format-actions" aria-label="Song format tools" hidden>
                    <button class="panel-btn" id="export-song" type="button">Export</button>
                    <button class="panel-btn" id="import-song" type="button">Import</button>
                </div>
            </section>
        </div>

        <section class="song-workspace">
            <aside class="edit-side-menu" id="edit-side-menu" aria-label="Edit controls">
                <div class="song-scrollbar" id="song-scrollbar" role="scrollbar" aria-controls="song-page" aria-orientation="vertical" aria-label="Song scroll" tabindex="0">
                    <span class="song-scrollbar-thumb" id="song-scrollbar-thumb"></span>
                </div>
                <div class="edit-mode-actions" aria-label="Edit actions">
                    <button class="icon-btn edit-mode-button" id="edit-toggle" type="button" title="Edit song" aria-pressed="false" aria-label="Edit song">&#9998;</button>
                    <button class="icon-btn cancel-edit-btn" id="cancel-edit" type="button" title="Cancel edit" hidden aria-label="Cancel edit">&#215;</button>
                </div>
                <div class="edit-side-content">
                    <div class="menu-number">
                        <span class="menu-number-label">Capo</span>
                        <label class="tiny-field"><span class="sr-only">Capo</span><input id="capo" type="number" min="-12" max="12" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-capo" type="button" title="Reset capo" aria-label="Reset capo">&#8634;</button>
                    </div>
                    <div class="menu-number">
                        <span class="menu-number-label">Countdown</span>
                        <label class="tiny-field"><span class="sr-only">Countdown</span><input id="countdown" type="number" min="0" max="16" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-countdown" type="button" title="Reset countdown" aria-label="Reset countdown">&#8634;</button>
                    </div>
                    <div class="menu-number">
                        <span class="menu-number-label">Measure</span>
                        <label class="tiny-field"><span class="sr-only">Measure</span><input id="beats-per-bar" type="number" min="1" max="12" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-measure" type="button" title="Reset measure" aria-label="Reset measure">&#8634;</button>
                    </div>
                    <div class="menu-number">
                        <span class="menu-number-label">Song BPM</span>
                        <label class="tiny-field song-bpm-field"><span class="sr-only">Song BPM</span><input id="song-bpm" type="number" min="30" max="240" step="1"></label>
                        <button class="reset-icon inline-reset" id="reset-song-bpm" type="button" title="Reset song BPM" aria-label="Reset song BPM">&#8634;</button>
                    </div>
                    <div class="edit-toggles">
                        <label class="playable-toggle circular-toggle online-toggle"><input id="online-available" type="checkbox"><span>Public</span></label>
                        <label class="playable-toggle circular-toggle"><input id="playable-toggle" type="checkbox"><span>Playable</span></label>
                        <label class="playable-toggle circular-toggle detailed-duration-toggle edit-detail-toggle"><input id="show-detailed-durations-edit" type="checkbox"><span>Show duration</span></label>
                        <label class="playable-toggle circular-toggle repetition-toggle edit-detail-toggle"><input id="show-repetitions-edit" type="checkbox"><span>Show repeats</span></label>
                        <label class="playable-toggle circular-toggle chord-tab-toggle edit-detail-toggle"><input id="show-chord-tabs-edit" type="checkbox"><span>Cross display</span></label>
                    </div>
                </div>
                <input id="import-song-file" type="file" accept=".json,.picky-song.json,application/json" hidden>
            </aside>
            <aside class="song-list-panel library-browser" id="library-browser">
                <div class="song-source-tabs library-source-tabs" aria-label="Song source">
                    <button class="song-source-tab library-pill active" data-source="local" type="button">Private</button>
                    <button class="song-source-tab library-pill" data-source="cloud" type="button">Public</button>
                </div>
                <div class="library-mode-row" aria-label="Library screens">
                    <button class="library-screen-pill active" id="new-song" data-library-screen="songs" type="button" title="New song">
                        <span class="library-pill-plus">+</span>
                        <span>Songs</span>
                    </button>
                    <div class="library-edit-actions" aria-label="Library edit actions">
                        <button class="library-edit-btn" id="library-edit-toggle" type="button" title="Edit library list" aria-pressed="false" aria-label="Edit library list">&#9998;</button>
                        <button class="library-edit-btn library-save-edit" id="library-save-edit" type="button" title="Save library edits" hidden aria-label="Save library edits">&#10003;</button>
                        <button class="library-edit-btn cancel-edit-btn library-cancel-edit" id="library-cancel-edit" type="button" title="Cancel library edits" hidden aria-label="Cancel library edits">&#215;</button>
                    </div>
                    <button class="library-screen-pill" id="new-setlist" data-library-screen="setlists" type="button" title="New setlist">
                        <span class="library-pill-plus">+</span>
                        <span>Setlists</span>
                    </button>
                </div>
                <input class="song-search" id="song-search" type="search" placeholder="search songs">
                <div class="song-list" id="song-list"></div>
            </aside>

            <article class="song-page" id="song-page">
                <h2 class="song-meta-display" id="song-meta-display">Song Title - Artist</h2>
                <p class="song-detail-display" id="song-detail-display">Capo 0, Measure 1/4, Original BPM 96</p>
                <div class="song-meta">
                    <input class="song-title" id="song-title" type="text" aria-label="Song title">
                    <input class="song-artist" id="song-artist" type="text" placeholder="Artist" aria-label="Song artist">
                </div>
                <div class="sections" id="sections"></div>
            </article>
        </section>

        <div class="confirm-overlay" id="delete-song-popup" hidden>
            <section class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="delete-song-title">
                <p class="confirm-kicker">Remove song</p>
                <h2 id="delete-song-title">Are you sure?</h2>
                <p class="confirm-copy" id="delete-song-copy">This song will be removed from your saved songs.</p>
                <div class="confirm-actions">
                    <button class="panel-btn confirm-cancel" id="cancel-delete-song" type="button">Cancel</button>
                    <button class="panel-btn confirm-danger" id="confirm-delete-song" type="button">Remove</button>
                </div>
            </section>
        </div>

        <div class="confirm-overlay auth-overlay" id="auth-popup" hidden>
            <form class="confirm-box auth-box" id="auth-form">
                <button class="auth-close" id="auth-close" type="button" aria-label="Close login">&times;</button>
                <p class="confirm-kicker">Cloud account</p>
                <h2>Log in to save songs</h2>
                <label class="auth-field">Name <input id="auth-name" type="text" autocomplete="name"></label>
                <label class="auth-field">Email <input id="auth-email" type="email" autocomplete="email" required></label>
                <label class="auth-field">Password
                    <span class="auth-password-field">
                        <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required>
                        <button class="password-toggle" id="auth-password-toggle" type="button" aria-label="Show password" title="Show password">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                                <circle cx="12" cy="12" r="2.7"></circle>
                            </svg>
                        </button>
                    </span>
                </label>
                <p class="auth-message" id="auth-message"></p>
                <div class="confirm-actions">
                    <button class="panel-btn confirm-cancel" id="auth-signup" type="button">Create account</button>
                    <button class="panel-btn" type="submit">Log in</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../widgets/chord-tooltip/chord-tooltip.js"></script>
    <script src="../core/app-core.js"></script>
    <script src="../features/cloud.js"></script>
    <script src="../features/storage.js"></script>
    <script src="../features/format.js"></script>
    <script src="../widgets/library-browser/songs-screen.js"></script>
    <script src="../widgets/library-browser/setlists-screen.js"></script>
    <script src="../widgets/library-browser/library-browser.js"></script>
    <script src="../widgets/player/beat-lightning.js"></script>
    <script src="../features/events.js"></script>
    <script src="../features/rendering.js"></script>
    <script src="../features/editor.js"></script>
    <script src="../features/player.js"></script>
    <script src="../features/bridge.js"></script>
    <script src="../features/models.js"></script>
    <script src="../tools/number-wheel/number-wheel.js"></script>
    <script src="../shared/music-utils.js"></script>
</body>
</html>
