<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Change</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="request-panel.css">
</head>
<body>
    <main class="request-panel" aria-label="Request a change">
        <section class="request-box">
            <h2>Request a Change</h2>
            <form name="change-requests" id="request-form">
                <label for="visitor-name">Name</label>
                <input id="visitor-name" name="name" type="text" autocomplete="name" required>

                <label for="request-text">Request</label>
                <textarea id="request-text" name="request" rows="5" required></textarea>

                <button class="panel-btn" type="submit">Send</button>
            </form>
            <p class="form-message" id="request-message" aria-live="polite"></p>
        </section>
    </main>

    <script src="request-panel.js"></script>
</body>
</html>
