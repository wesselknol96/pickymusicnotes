<header class="song-toolbar">
            <div class="toolbar-title">
                <span class="toolbar-kicker">Record Player</span>
                <strong id="mode-label">Display mode</strong>
            </div>
            <div class="toolbar-actions">
                <button class="icon-btn" id="edit-toggle" type="button" title="Edit song" aria-pressed="false">Edit</button>
                <button class="icon-btn cancel-edit-btn" id="cancel-edit" type="button" title="Cancel edit" hidden>&times;</button>
                <div class="section-menu" id="section-menu" hidden></div>
                <button class="icon-btn" id="random-toggle" type="button" title="Randomizer">?</button>
            </div>
        </header>
